    <link rel="manifest" href="/icons/manifest.json" />
    <!-- Theme flash prevention: apply saved theme before paint -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('ng-theme');
          var valid = ['academic-ivory', 'deep-navy', 'dark-research', 'elegant-light'];
          if (saved && valid.indexOf(saved) !== -1) {
            document.documentElement.dataset.theme = saved;
          } else {
            document.documentElement.dataset.theme = 'academic-ivory';
          }
        } catch(e) {
          document.documentElement.dataset.theme = 'academic-ivory';
        }
      })();
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
